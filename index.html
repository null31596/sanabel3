<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanabel Academy - Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: fadeIn 0.8s ease-in-out;
            border: none;
        }

        /* أنيميشن لظهور الصفحة */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            background: var(--primary-color);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 5px solid var(--accent-color);
        }

        .title p {
            font-size: 32px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .img-wrapper {
            text-align: center;
            padding: 20px;
        }

        img {
            width: 200px;
            /* تصغير الصورة لتناسب التصميم */
            height: auto;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

        #inputs {
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: #f9f9f9;
        }

        #inputs input {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            width: 250px;
        }

        #inputs input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        #inputs button {
            padding: 12px 30px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        #inputs button:hover {
            background: #219150;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(39, 174, 96, 0.3);
        }

        #result {
            padding: 30px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #info {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border-right: 5px solid var(--accent-color);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.02);
        }

        #info span {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
            font-size: 18px;
            color: #555;
        }

        #info p {
            color: var(--primary-color);
            font-weight: bold;
        }

        /* إخفاء النتائج في البداية */
        #result {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <p>Sanabel Academy</p>
        </div>

        <div class="img-wrapper">
            <img src="Gemini_Generated_Image_knnpiknnpiknnpik.png" alt="Logo">
        </div>

        <div id="inputs">
            <input type="text" placeholder="اسم المستخدم" id="username">
            <input type="text" placeholder="رقم البطاقة الوطنية (CIN)" id="CIN">
            <button id="searsh">بحث</button>
        </div>

        <div id="result">
            <div id="info">
                <span>الاسم الكامل: <p id="name"></p></span>
                <span>رقم البطاقة: <p id="CIN_info"></p></span>
                <span>التخصص: <p id="specialization"></p></span>
                <span>المده: <p id="dure"></p></span>
                <span>تاريخ الانضمام: <p id="join"></p></span>
                <span>تاريخ  التخرج: <p id="end"></p></span>
            </div>
        </div>
    </div>

    
        <script>
    let dataUser = [
        {
           name: 'Ayoub Marnoufi',
           CIN: 'HH105366',
           specialization:'Responsable QHSE',
           dure:'1',
           dateJoin:'03/15/2025',
           dateEnd:'15/03/2026' 
        }, {
           name: 'Fatima ezzahra Fax',
           CIN: 'N440951',
           specialization:'aide-soignante',
           dure:'2 mois',
           dateJoin:'01/10/2025',
           dateEnd:'1/01/2026' 
        }, {
           name: 'Saleh Mikh Lbadaoui',
           CIN: 'V322437',
           specialization:'Coiffure-Hommes &  Femmes',
           dure:'6 mois',
           dateJoin:'01/9/2025',
           dateEnd:'1/02/2026' 
        },
        
    ];

    document.getElementById('searsh').addEventListener('click', () => {
        // جلب القيم من المدخلات
        let inputName = document.getElementById('username').value;
        let inputCIN = document.getElementById('CIN').value;
        
        let found = false; // متغير للتأكد هل وجدنا المستخدم أم لا

        for (let i = 0; i < dataUser.length; i++) {
            // المقارنة
            if (dataUser[i].name === inputName && dataUser[i].CIN === inputCIN) {
                console.log("تم العثور على: " + dataUser[i].name);
                
                // إظهار مربع النتيجة
                document.getElementById("result").style.display = "block";
                
                // تعبئة البيانات (استخدام innerHTML أو textContent)
                document.getElementById('name').innerText = dataUser[i].name;
                document.getElementById('CIN_info').innerText = dataUser[i].CIN;
                 document.getElementById('specialization').innerText = dataUser[i].specialization;
                document.getElementById('dure').innerText = dataUser[i].dure ;
                document.getElementById('join').innerText = dataUser[i].dateJoin;
                document.getElementById('end').innerText = dataUser[i]. dateEnd;
                
                found = true;
                break; // نوقف الحلقة لأننا وجدنا المستخدم
            }
        }

        if (!found) {
            console.log('غير موجود');
            alert("المستخدم غير موجود، تأكد من البيانات");
            document.getElementById("result").style.display = "none";
        }
    });
</script>

    
</body>

</html>
